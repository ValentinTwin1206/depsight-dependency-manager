version = 1
revision = 3
requires-python = ">=3.12"

[[package]]
name = "click"
version = "8.3.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "rich"
version = "14.3.3"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "mkdocs"
version = "1.6.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "nuitka"
version = "2.6.7"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "myapp"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "click" },
    { name = "rich" },
]

# PEP 735 dependency-groups  →  dev-dependencies
[package.dev-dependencies]
dev = [
    { name = "pytest" },
]
build = [
    { name = "nuitka" },
]
docs = [
    { name = "mkdocs" },
]

[package.metadata]
requires-dist = [
    { name = "click", specifier = ">=8.1.7" },
    { name = "rich", specifier = ">=13.7.0" },
]

[package.metadata.requires-dev]
dev = [{ name = "pytest", specifier = ">=8.0" }]
build = [{ name = "nuitka", specifier = ">=2.0" }]
docs = [{ name = "mkdocs", specifier = ">=1.6" }]

[[package]]
name = "pytest"
version = "8.3.5"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "markupsafe"
version = "3.0.2"
source = { registry = "https://pypi.org/simple" }
