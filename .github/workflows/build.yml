name: CI (DevContainer Build & Test)

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Git release tag to verify against pyproject.toml (e.g. 1.2.3)."
        required: false
        default: ""
        type: string
      upload_artifacts:
        description: "Upload wheel + binaries as workflow artifacts"
        required: false
        default: false
        type: boolean
      build_binary:
        description: "Build a standalone Nuitka binary"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify release tag matches pyproject.toml
        if: ${{ inputs.release_tag != '' }}
        env:
          TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          echo "::group::Version check"

          toml_version=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Parsed '$TAG' as Git tag"
          echo "Parsed '$toml_version' from pyproject.toml"

          if [[ "$TAG" != "$toml_version" ]]; then
            echo "::error::Tag '$TAG' does not match pyproject.toml version '$toml_version'"
            exit 1
          fi

          echo "Tag and pyproject.toml version match ('$TAG')"

          echo "::endgroup::"

      - name: Lint, test & build wheel
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/devcontainer.json
          runCmd: |

            set -e

            echo "::group::Environment"
            python --version
            pip --version
            which python
            echo "::endgroup::"

            source .venv/bin/activate

            echo "::group::CLI health check"
            deply --help
            echo "::endgroup::"

            echo "::group::Ruff linting"
            ruff check src/ tests/
            echo "::endgroup::"

            echo "::group::Type checking"
            mypy src/
            echo "::endgroup::"

            echo "::group::Pytest"
            python -m pytest tests/ -v --tb=short
            echo "::endgroup::"

            echo "::group::Build wheel"
            uv build
            ls -lah dist
            echo "::endgroup::"

      # - name: Build binary with Nuitka
      #   if: ${{ inputs.build_binary }}
      #   uses: devcontainers/ci@v0.3
      #   with:
      #     configFile: .devcontainer/devcontainer.json
      #     runCmd: |

      #       set -e

      #       source .venv/bin/activate

      #       bash .github/scripts/build_binary.sh

      - name: Upload wheel
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: deply-wheel
          path: dist/*.whl
          retention-days: 14
          if-no-files-found: error

      - name: Upload binary
        if: ${{ inputs.build_binary && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: deply-binary-linux-amd64
          path: dist/deply
          retention-days: 14
          if-no-files-found: error