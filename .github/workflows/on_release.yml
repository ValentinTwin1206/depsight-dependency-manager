name: On Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      depsight_version: ${{ steps.check.outputs.version }}
      uv_version: ${{ steps.versions.outputs.uv_version }}
      python_version: ${{ steps.versions.outputs.python_version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # Verify PEP 440 compliance
          if ! echo "$TAG" | grep -qP '^(\d+!)?(\d+)(\.(\d+))*(\.(a|b|rc)\d+)?(\.post\d+)?(\.dev\d+)?$'; then
            echo "::error::Tag '$TAG' is not PEP 440 compliant"
            exit 1
          fi

          echo "Tag '$TAG' is PEP 440 compliant"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - id: versions
        run: |
          source versions.env
          echo "uv_version=$UV_VERSION" >> "$GITHUB_OUTPUT"
          echo "python_version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"

  call-build:
    needs: verify-tag
    uses: ./.github/workflows/build.yml
    with:
      is_release: true
      uv_version: ${{ needs.verify-tag.outputs.uv_version }}
      python_version: ${{ needs.verify-tag.outputs.python_version }}
      depsight_version: ${{ github.event.release.tag_name }}
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      DOCKER_PAT: ${{ secrets.DOCKER_PAT }}
